services:
  postgres:
    image: postgres:16-alpine
    container_name: queens-banquet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: queensbanquet
      POSTGRES_PASSWORD: queensbanquet
      POSTGRES_DB: queensbanquet
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U queensbanquet -d queensbanquet']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
