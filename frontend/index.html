  </script>
  <script>
    (function () {
      try {
        var key = 'queens-banquet-theme';
        var stored = localStorage.getItem(key);
        var theme = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolved = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
        var root = document.documentElement;
        if (resolved === 'dark') root.classList.add('dark');
        else root.classList.remove('dark');
        root.style.colorScheme = resolved;
        root.dataset.theme = resolved;
      } catch (e) {}
    })();
  </script>
  <title>Queen's Banquet Events | Wedding Coordination by Marou Madrid</title>

<body class="bg-background text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
